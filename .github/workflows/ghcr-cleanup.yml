name: Clean up old GHCR images

on:
  schedule:
    - cron: '0 3 * * 0'
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      packages: write

    steps:
      - uses: dataaxiom/ghcr-cleanup-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          package: assfisc-thin-client
          exclude-tags: latest,10,10.1,main
          keep-n-tagged: 5
          delete-untagged: true
          dry-run: false

